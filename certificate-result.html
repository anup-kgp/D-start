<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Certificate Result | Kharagpur Mini Marathon 2026</title>
    <meta
      name="description"
      content="Download your Kharagpur Mini Marathon 2026 certificate after verification."
    />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="canonical" href="https://kdsac.in/certificate-result.html" />
    <link rel="icon" href="./assets/logo.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav">
        <a class="brand" href="./index.html">
          <img class="brand-logo" src="./assets/logo.png" alt="D Star Athletic Club logo" />
          <span class="brand-text">
            <strong>D Star Athletic Club <img class="brand-runner-image" src="./run.png" alt="Running athlete" /></strong>
            <small>Sports Events & Registration</small>
          </span>
        </a>
        <nav class="nav-links">
          <a href="./certificate.html">Back to Search</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="section certificate-section">
        <div class="container">
          <div class="certificate-preview" id="certificatePreview">
            <div class="certificate-shell" id="certificateShell">
              <canvas id="certificateCanvas" style="width: 100%; height: auto; display: block; border-radius: 18px;"></canvas>
            </div>
            <button class="button button-secondary button-full" id="downloadCertificate" type="button">
              Download Certificate
            </button>
            <p class="form-note" id="certificateMessage"></p>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="./certificate-result.js"></script>
  </body>
</html>
